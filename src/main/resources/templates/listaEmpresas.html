<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Empresas Cadastradas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Empresas</h2>
        <a href="/cadastrar-empresa" class="btn btn-success">Adicionar Nova Empresa</a>
    </div> 

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th scope="col">ID (Resumo)</th>
                <th scope="col">Nome</th>
                <th scope="col">CNPJ</th>
                <th scope="col">Telefone</th>
                <th scope="col">Funcionários</th>
                <th scope="col">Setor</th>
                <th scope="col">Data</th>
                <th scope="col">Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="empresa : ${empresas}">
                <td th:text="${#strings.substring(empresa.id, 0, 8)}"></td>
                <td th:text="${empresa.nomeEmpresa}"></td> 
                <td th:text="${empresa.cnpj}"></td> 
                <td th:text="${empresa.telefone}"></td>
                <td th:text="${empresa.qtdFuncionario}"></td>
                <td th:text="${empresa.setorEmpresa}"></td> 
                <td th:text="${#temporals.format(empresa.dataCadastro, 'dd/MM/yyyy')}"></td>
                <td>
                    <a th:href="@{/edit/{id}(id=${empresa.id})}" class="btn btn-warning btn-sm">Editar</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
