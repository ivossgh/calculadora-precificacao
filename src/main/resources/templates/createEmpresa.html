<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Empresa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="card p-4 shadow-sm">
        <h2>Cadastrar Empresa</h2>

        <form method="POST" th:action="@{/cadastrar-empresa}">
            <div class="mb-3">
                <label for="empresaName" class="form-label">Nome da Empresa</label>
                <input type="text" class="form-control" id="empresaName" name="nomeEmpresa" placeholder="Ex: Ecos SST" required>
            </div>

            <div class="mb-3">
                <label for="cnpj" class="form-label">CNPJ da Empresa</label>
                <input type="text" class="form-control" id="cnpj" name="cnpj" placeholder="Ex: 11.000.000/0000-11" required>
            </div>

            <div class="mb-3">
                <label for="telefone" class="form-label">Telefone da Empresa</label>
                <input type="text" class="form-control" id="telefone" name="telefone" placeholder="Ex: 89981173746" required>
            </div>

            <div class="mb-3">
                <label for="qtdFuncionario" class="form-label">Quantidade de Funcionarios</label>
                <input type="number" class="form-control" id="qtdFuncionario" name="qtdFuncionario" placeholder="Ex: 50" required>
            </div>

            <div class="mb-3">
                <label for="setorEmpresa" class="form-label">Segmento da Empresa</label>
                <select class="form-select" id="setorEmpresa" name="setorEmpresa" required>
                    <option value="">Selecione o segmento</option>
                    <option th:each="s : ${T(com.vendas.principal.model.enums.Setor).values()}" 
                            th:value="${s}" 
                            th:text="${s.descricao}">
                    </option>
                </select>
            </div>

            <div class="mb-3">
                <label for="dataCadastro" class="form-label">Data de Cadastro</label>
                <input type="date" class="form-control" id="dataCadastro" name="dataCadastro" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
        </form>
    </div>
    
</body>
</html>
