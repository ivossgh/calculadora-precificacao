<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Consultores Cadastradas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Consultores</h2>
        <a href="/cadastrar-consultor" class="btn btn-success">Adicionar Novo Consultor</a>
    </div> 

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th scope="col">ID (Resumo)</th>
                <th scope="col">Nome</th>
                <th scope="col">Telefone</th>
                <th scope="col">Data de Contratacao</th>
                <th scope="col">Meta</th>
                <th scope="col">Meta do Mes</th>
                <th scope="col">Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="vendedor : ${consultores}">
                <td th:text="${#strings.substring(vendedor.id, 0, 8)}"></td>
                <td th:text="${vendedor.nomeConsultor}"></td> 
                <td th:text="${vendedor.telefoneConsultor}"></td> 
                <td th:text="${#temporals.format(vendedor.dataContratacao, 'dd/MM/yyyy')}"></td>
                <td th:text="${vendedor.meta}"></td> 
                <td th:text="${vendedor.vendasAcumuladasMes}"></td> 
                <td>
                    <a th:href="@{/edit/{id}(id=${vendedor.id})}" class="btn btn-warning btn-sm">Editar</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
